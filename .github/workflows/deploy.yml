name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - wp_update
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    name: Lint and unit tests
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci || npm install

      - name: Frontend unit tests
        run: npm test

      - name: Install CMS Dependencies
        working-directory: ./cms
        run: npm ci || npm install

      - name: CMS lint
        working-directory: ./cms
        run: npm run lint
        continue-on-error: true

  deploy-cms:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    name: Deploy Payload CMS Worker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci || npm install

      - name: Install CMS Dependencies
        working-directory: ./cms
        run: npm ci || npm install

      - name: Run CMS database migrations
        working-directory: ./cms
        run: npm run deploy:database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Optional but recommended if the token can access multiple accounts
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # SQLite maintenance only — do not block Worker deploy on D1 API permission gaps
      - name: Optimize D1 (best-effort)
        working-directory: ./cms
        continue-on-error: true
        run: npm run optimize:d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy CMS Worker
        working-directory: ./cms
        run: npm run deploy:app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-frontend:
    if: github.event_name != 'pull_request'
    needs: deploy-cms
    runs-on: ubuntu-latest
    name: Deploy Eleventy Site Worker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Eleventy
        run: npm run build
        env:
          PAYLOAD_API_URL: https://admin.studiostonehewer.co.uk
          # Fail the build if Payload is unreachable (no dummy-content deploys)
          STRICT_PAYLOAD: '1'
          CI: 'true'
          # Serve CMS media from R2 custom domain (not the admin Worker)
          MEDIA_PUBLIC_URL: https://media.studiostonehewer.co.uk

      - name: Deploy Frontend to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
