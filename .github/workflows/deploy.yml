name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types:
      - wp_update

jobs:
  deploy-cms:
    runs-on: ubuntu-latest
    name: Deploy Payload CMS Worker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm ci || npm install

      - name: Install CMS Dependencies
        working-directory: ./cms
        run: npm install

      - name: Deploy CMS Worker
        working-directory: ./cms
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-frontend:
    needs: deploy-cms
    runs-on: ubuntu-latest
    name: Deploy Eleventy Site Worker
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Eleventy
        run: npm run build
        env:
          PAYLOAD_API_URL: https://admin.studiostonehewer.co.uk

      - name: Deploy Frontend to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

