<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
  </head>
  <body>
    <!-- Include React for custom previews -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Include Cloudinary Media Library -->
    <script src="https://media-library.cloudinary.com/global/all.js"></script>
    <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
    <script>
      var ProjectPreview = createClass({
        render: function() {
          var entry = this.props.entry;
          var title = entry.getIn(['data', 'title']);
          var category = entry.getIn(['data', 'category']);
          var tag = entry.getIn(['data', 'tag']);
          var bg = this.props.getAsset(entry.getIn(['data', 'featured_image']));
          
          return h('div', {style: {padding: '20px', fontFamily: 'sans-serif'}},
            h('div', {style: {backgroundImage: 'url('+bg+')', backgroundSize: 'cover', height: '300px', width: '100%', borderRadius: '8px'}}),
            h('h4', {style: {color: '#888', letterSpacing: '2px', textTransform: 'uppercase'}}, category + ' • ' + tag),
            h('h1', {}, title),
            h('p', {style: {lineHeight: '1.6'}}, entry.getIn(['data', 'intro_text_1']))
          );
        }
      });
      CMS.registerPreviewTemplate("projects", ProjectPreview);
    </script>
  </body>
</html>
