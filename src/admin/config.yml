backend:
  name: github
  repo: nikisiagit/studiostonehewer
  branch: main
  base_url: https://studiostonehewer.nikitavo.workers.dev

media_folder: "src/assets/images" # Media files will be stored in the repo under src/assets/images
public_folder: "/assets/images" # The src attribute for uploaded media will begin with /assets/images

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "project.njk"}
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "string"}
      - {label: "Tag (e.g. FULL SERVICE)", name: "tag", widget: "string"}
      - {label: "Year", name: "year", widget: "string"}
      - {label: "Card Description", name: "description", widget: "text"}
      - {label: "Featured Image", name: "featured_image", widget: "image"}
      - {label: "Intro Text Paragraph 1", name: "intro_text_1", widget: "text"}
      - {label: "Intro Text Paragraph 2", name: "intro_text_2", widget: "text"}
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        fields:
          - {label: "Image", name: "image", widget: "image"}
          - {label: "Size", name: "size", widget: "select", options: ["regular", "tall", "wide"], default: "regular"}
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "src/index.html"
        fields:
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "Hero Caption", name: "hero_caption", widget: "string"}
          - {label: "Quote Text", name: "quote_text", widget: "text"}
          - {label: "Quote Author", name: "quote_author", widget: "string"}
          - {label: "Studio Intro Subtitle", name: "studio_subtitle", widget: "string"}
          - {label: "Studio Intro Title", name: "studio_title", widget: "string"}
          - {label: "Studio Intro Description", name: "studio_description", widget: "text"}
          - {label: "Projects Subtitle", name: "projects_subtitle", widget: "string"}
          - {label: "Projects Title", name: "projects_title", widget: "string"}
          - {label: "Projects Description", name: "projects_description", widget: "text"}
          - {label: "How We Work Subtitle", name: "hww_subtitle", widget: "string"}
          - {label: "How We Work Title", name: "hww_title", widget: "string"}
          - {label: "How We Work Description", name: "hww_description", widget: "text"}
          - {label: "How We Work Image", name: "hww_image", widget: "image"}
          - {label: "Virtual Service Title", name: "virtual_title", widget: "string"}
          - {label: "Virtual Service Description", name: "virtual_description", widget: "text"}
          - {label: "Virtual Service Expectations", name: "virtual_expectations", widget: "list", field: {label: "Item", name: "item", widget: "string"}}
          - {label: "Full Service Title", name: "full_title", widget: "string"}
          - {label: "Full Service Description", name: "full_description", widget: "text"}
          - {label: "Full Service Expectations", name: "full_expectations", widget: "list", field: {label: "Item", name: "item", widget: "string"}}
          - {label: "Services CTA Title", name: "cta_title", widget: "string"}
          - {label: "Services CTA Description", name: "cta_description", widget: "text"}
          - {label: "About Subtitle", name: "about_subtitle", widget: "string"}
          - {label: "About Title", name: "about_title", widget: "string"}
          - {label: "About Image", name: "about_image", widget: "image"}
          - {label: "About Role", name: "about_role", widget: "string"}
          - {label: "About Name", name: "about_name", widget: "string"}
          - {label: "About Bio Paragraphs", name: "about_body", widget: "list", field: {label: "Paragraph", name: "paragraph", widget: "text"}}
          - label: "What Guides Us Values"
            name: "guides"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "string"}
          - {label: "Final CTA Title", name: "final_cta_title", widget: "string"}
          - {label: "Contact Subtitle", name: "contact_subtitle", widget: "string"}
          - {label: "Contact Title", name: "contact_title", widget: "string"}
          - {label: "Contact Description", name: "contact_description", widget: "text"}
          - {label: "Contact Email", name: "contact_email", widget: "string"}
          - {label: "Contact Instagram", name: "contact_instagram", widget: "string"}
      - label: "Site Settings"
        name: "settings"
        file: "src/_data/settings.json"
        fields:
          - {label: "Navigation Logo", name: "nav_logo", widget: "image"}
          - label: "Navigation Links"
            name: "nav_links"
            widget: "list"
            fields:
              - {label: "Label", name: "label", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
