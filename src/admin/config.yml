backend:
  name: github
  repo: nikisiagit/studiostonehewer
  branch: main
  base_url: https://studiostonehewer.nikitavo.workers.dev

publish_mode: editorial_workflow

media_library:
  name: cloudinary
  config:
    cloud_name: davgu5v34
    api_key: 382466491421122

collections:
  - name: "projects"
    label: "Projects"
    description: "Manage your portfolio projects here. Each project automatically gets its own page and a card on the Home Page."
    folder: "src/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Layout", name: "layout", widget: "hidden", default: "project.njk"}
      - {label: "Tags", name: "tags", widget: "hidden", default: ["projects"]}
      - {label: "Title", name: "title", widget: "string", hint: "The name of the project (e.g. Amsterdam Oud-West)."}
      - {label: "Category", name: "category", widget: "string", hint: "E.g. RESIDENTIAL or COMMERCIAL"}
      - {label: "Tag (e.g. FULL SERVICE)", name: "tag", widget: "string", hint: "A short tag that appears on the project card."}
      - {label: "Year", name: "year", widget: "string", hint: "The year the project was completed."}
      - {label: "Card Description", name: "description", widget: "text", hint: "A short summary that appears on the Home Page project cards."}
      - {label: "SEO Description (Optional override)", name: "seo_description", widget: "text", required: false, hint: "Custom description for when you share this specific project link on social media or iMessage."}
      - {label: "Featured Image", name: "featured_image", widget: "image", hint: "The main cover image used for the project card on the Home Page."}
      - {label: "SEO Image (Optional override)", name: "seo_image", widget: "image", required: false, hint: "Custom preview image for when you share this link. If empty, uses the global site image."}
      - {label: "Intro Text Paragraph 1", name: "intro_text_1", widget: "text", hint: "The first paragraph of the project's introduction."}
      - {label: "Intro Text Paragraph 2", name: "intro_text_2", widget: "text", hint: "The second paragraph of the project's introduction."}
      - label: "Gallery"
        name: "gallery"
        widget: "list"
        hint: "Add as many images as you like. They will automatically build themselves into a beautiful masonry grid!"
        fields:
          - {label: "Image", name: "image", widget: "image"}
          - {label: "Size", name: "size", widget: "select", options: ["regular", "tall", "wide"], default: "regular", hint: "Controls how much space the image takes up in the grid."}
  - name: "pages"
    label: "Pages"
    description: "Edit the core pages of your website, like the Home Page."
    files:
      - label: "Portfolio Page"
        name: "portfolio"
        file: "src/portfolio.md"
        description: "Manage the content at the top of the Portfolio page."
        fields:
          - {label: "SEO Title", name: "title", widget: "string"}
          - {label: "SEO Description (Optional)", name: "seo_description", widget: "text", required: false}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Header Title", name: "header_title", widget: "string"}
          - {label: "Header Description", name: "header_description", widget: "text"}
          - {label: "Permalink", name: "permalink", widget: "hidden", default: "/projects/index.html"}
          - {label: "Layout", name: "layout", widget: "hidden", default: "portfolio.njk"}
      - label: "Home Page"
        name: "home"
        file: "src/index.html"
        description: "Manage all the sections on your scrolling Home Page."
        fields:
          - {label: "SEO Description (Optional override)", name: "seo_description", widget: "text", required: false, hint: "Custom description for when you share the Home Page link."}
          - {label: "SEO Image (Optional override)", name: "seo_image", widget: "image", required: false, hint: "Custom preview image for the Home Page link."}
          - {label: "Hero Left Image", name: "hero_left_image", widget: "image", hint: "The large left-side background image at the top of the site."}
          - {label: "Hero Left Caption", name: "hero_left_caption", widget: "string", hint: "The text that appears when you hover over the left image."}
          - {label: "Hero Left Link URL (optional)", name: "hero_left_url", widget: "string", required: false, hint: "Where the left image takes you when clicked (e.g. /projects/oud-west/)."}
          - {label: "Hero Right Image", name: "hero_right_image", widget: "image", hint: "The large right-side background image."}
          - {label: "Hero Right Caption", name: "hero_right_caption", widget: "string", hint: "The text that appears when you hover over the right image."}
          - {label: "Hero Right Link URL (optional)", name: "hero_right_url", widget: "string", required: false, hint: "Where the right image takes you when clicked."}
          - {label: "Quote Text", name: "quote_text", widget: "text", hint: "The large inspirational quote below the hero banner."}
          - {label: "Quote Author", name: "quote_author", widget: "string", hint: "Who said the quote."}
          - {label: "Studio Intro Subtitle", name: "studio_subtitle", widget: "string"}
          - {label: "Studio Intro Title", name: "studio_title", widget: "string"}
          - {label: "Studio Intro Description", name: "studio_description", widget: "text"}
          - {label: "Projects Subtitle", name: "projects_subtitle", widget: "string"}
          - {label: "Projects Title", name: "projects_title", widget: "string"}
          - {label: "Projects Description", name: "projects_description", widget: "text", hint: "The introductory text above the project cards."}
          - {label: "How We Work Subtitle", name: "hww_subtitle", widget: "string"}
          - {label: "How We Work Title", name: "hww_title", widget: "string"}
          - {label: "How We Work Description", name: "hww_description", widget: "text"}
          - {label: "How We Work Image", name: "hww_image", widget: "image", hint: "The full-width photo dividing the services."}
          - {label: "Virtual Service Title", name: "virtual_title", widget: "string"}
          - {label: "Virtual Service Description", name: "virtual_description", widget: "text"}
          - {label: "Virtual Service Expectations", name: "virtual_expectations", widget: "list", hint: "Bullet points outlining what the client receives.", field: {label: "Item", name: "item", widget: "string"}}
          - {label: "Full Service Title", name: "full_title", widget: "string"}
          - {label: "Full Service Description", name: "full_description", widget: "text"}
          - {label: "Full Service Expectations", name: "full_expectations", widget: "list", hint: "Bullet points for full service expectations.", field: {label: "Item", name: "item", widget: "string"}}
          - {label: "Services CTA Title", name: "cta_title", widget: "string", hint: "The large title banner below the services."}
          - {label: "Services CTA Description", name: "cta_description", widget: "text"}
          - {label: "About Subtitle", name: "about_subtitle", widget: "string"}
          - {label: "About Title", name: "about_title", widget: "string"}
          - {label: "About Image", name: "about_image", widget: "image", hint: "The founder's headshot."}
          - {label: "About Role", name: "about_role", widget: "string"}
          - {label: "About Name", name: "about_name", widget: "string"}
          - {label: "About Bio Paragraphs", name: "about_body", widget: "list", hint: "Add one item per paragraph for the biography.", field: {label: "Paragraph", name: "paragraph", widget: "text"}}
          - label: "What Guides Us Values"
            name: "guides"
            widget: "list"
            hint: "The list of core principles near the bottom of the page."
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Description", name: "description", widget: "string"}
          - {label: "Final CTA Title", name: "final_cta_title", widget: "string", hint: "The large text right above the contact section."}
          - {label: "Contact Subtitle", name: "contact_subtitle", widget: "string"}
          - {label: "Contact Title", name: "contact_title", widget: "string"}
          - {label: "Contact Description", name: "contact_description", widget: "text"}
          - {label: "Contact Email", name: "contact_email", widget: "string"}
          - {label: "Contact Instagram", name: "contact_instagram", widget: "string", hint: "E.g. @studiostonehewer"}
      - label: "Site Settings"
        name: "settings"
        file: "src/_data/settings.json"
        description: "Global settings that affect the entire website."
        fields:
          - {label: "Global Site Title", name: "site_title", widget: "string", hint: "The main name of your website for search engines."}
          - {label: "Global Site Description", name: "site_description", widget: "text", hint: "The default text that appears when you share your website link."}
          - {label: "Global Site Image", name: "site_image", widget: "image", hint: "The default preview image for sharing links on social media/iMessage."}
          - {label: "Navigation Logo", name: "nav_logo", widget: "image", hint: "The brand logo in the top left corner."}
          - label: "Navigation Links"
            name: "nav_links"
            widget: "list"
            hint: "The menu links at the top and bottom of the website."
            fields:
              - {label: "Label", name: "label", widget: "string", hint: "E.g. PROJECTS"}
              - {label: "URL", name: "url", widget: "string", hint: "E.g. /#projects"}
